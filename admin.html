<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logan Crypto | Admin</title>
  <link rel="icon" href="./logan-logo.jpg" />
  <link rel="stylesheet" href="./admin.css?v=3" />
</head>
<body class="admin-body light-theme">
  <div class="admin-shell">
    <header class="admin-header">
      <a href="./dashboard.html" class="admin-brand">
        <img src="./logan-logo.jpg" alt="Logan Crypto" class="admin-brand-logo" />
        <div>
          <div class="admin-brand-title">LOGAN <span>CRYPTO</span></div>
          <div class="admin-brand-sub">ADMIN PANEL</div>
        </div>
      </a>

      <div class="admin-header-actions">
        <div class="admin-role-badge">ADMIN</div>
        <button id="themeToggleBtn" class="theme-btn" type="button">☀</button>
        <button id="logoutBtn" class="logout-btn" type="button">Đăng xuất</button>
      </div>
    </header>

    <section class="admin-hero">
      <div class="admin-hero-card">
        <div>
          <div class="hero-chip">QUẢN LÝ NỘI DUNG</div>
          <h1>Trang quản trị Logan Crypto</h1>
          <p>
            Tạo khóa học, bài học, từ điển crypto và tin tức trực tiếp từ giao diện quản trị.
          </p>
        </div>
      </div>
    </section>

    <section class="admin-tabs-wrap">
      <div class="admin-tabs">
        <button class="admin-tab active" data-tab="courses" type="button">Khóa học</button>
        <button class="admin-tab" data-tab="lessons" type="button">Bài học</button>
        <button class="admin-tab" data-tab="dictionary" type="button">Từ điển</button>
        <button class="admin-tab" data-tab="news" type="button">Tin tức</button>
      </div>
    </section>

    <!-- COURSES -->
    <section class="tab-panel active" id="tab-courses">
      <div class="admin-grid two-col">
        <div class="admin-card">
          <div class="card-head">
            <h2>Tạo khóa học</h2>
          </div>

          <form id="courseForm" class="admin-form">
            <input id="courseTitle" type="text" placeholder="Tên khóa học" required />
            <input id="courseSubtitle" type="text" placeholder="Phụ đề khóa học" />
            <input id="courseLevelLabel" type="text" placeholder="Ví dụ: 🥈 Silver / 🥇 Gold / 💎 Diamond" />
            <input id="courseThumbnailUrl" type="text" placeholder="Link hình thumbnail khóa học" />

            <select id="courseRequiredRole" required>
              <option value="free">Free</option>
              <option value="medium">Medium</option>
              <option value="pro">Pro</option>
            </select>

            <textarea id="courseDescription" placeholder="Mô tả khóa học"></textarea>

            <input id="courseOrder" type="number" placeholder="Thứ tự hiển thị" value="1" />

            <label class="checkbox-line">
              <input id="coursePublished" type="checkbox" checked />
              <span>Hiển thị khóa học</span>
            </label>

            <button type="submit" class="primary-btn">Lưu khóa học</button>
          </form>
        </div>

        <div class="admin-card">
          <div class="card-head">
            <h2>Danh sách khóa học</h2>
          </div>
          <div id="courseList" class="admin-list"></div>
        </div>
      </div>
    </section>

    <!-- LESSONS -->
    <section class="tab-panel" id="tab-lessons">
      <div class="admin-grid two-col">
        <div class="admin-card">
          <div class="card-head">
            <h2>Tạo bài học</h2>
          </div>

          <form id="lessonForm" class="admin-form">
            <select id="lessonCourseId" required>
              <option value="">Chọn khóa học</option>
            </select>

            <input id="lessonTitle" type="text" placeholder="Tên bài học" required />
            <input id="lessonDuration" type="text" placeholder="Ví dụ: 12 phút" />
            <input id="lessonVimeoUrl" type="text" placeholder="Vimeo Embed URL" />
            <textarea id="lessonDescription" placeholder="Mô tả bài học"></textarea>
            <textarea id="lessonNotes" placeholder="Mỗi dòng là 1 note"></textarea>
            <input id="lessonOrder" type="number" placeholder="Thứ tự hiển thị" value="1" />

            <label class="checkbox-line">
              <input id="lessonPublished" type="checkbox" checked />
              <span>Hiển thị bài học</span>
            </label>

            <button type="submit" class="primary-btn">Lưu bài học</button>
          </form>
        </div>

        <div class="admin-card">
          <div class="card-head">
            <h2>Danh sách bài học</h2>
          </div>
          <div id="lessonListAdmin" class="admin-list"></div>
        </div>
      </div>
    </section>

    <!-- DICTIONARY -->
    <section class="tab-panel" id="tab-dictionary">
      <div class="admin-grid two-col">
        <div class="admin-card">
          <div class="card-head">
            <h2>Thêm thuật ngữ</h2>
          </div>

          <form id="dictionaryForm" class="admin-form">
            <input id="dictionaryTerm" type="text" placeholder="Thuật ngữ" required />
            <input id="dictionarySlug" type="text" placeholder="Slug, ví dụ: fair-value-gap" />
            <input id="dictionaryShortMeaning" type="text" placeholder="Nghĩa ngắn" />
            <input id="dictionaryCategory" type="text" placeholder="Category, ví dụ: Price Action" />
            <textarea id="dictionaryDefinition" placeholder="Giải thích chi tiết"></textarea>
            <input id="dictionaryKeywords" type="text" placeholder="Keywords, ngăn cách bằng dấu phẩy" />
            <input id="dictionaryOrder" type="number" placeholder="Thứ tự hiển thị" value="1" />

            <button type="submit" class="primary-btn">Lưu thuật ngữ</button>
          </form>
        </div>

        <div class="admin-card">
          <div class="card-head">
            <h2>Danh sách thuật ngữ</h2>
          </div>
          <div id="dictionaryList" class="admin-list"></div>
        </div>
      </div>
    </section>

    <!-- NEWS -->
    <section class="tab-panel" id="tab-news">
      <div class="admin-grid two-col">
        <div class="admin-card">
          <div class="card-head">
            <h2>Đăng tin tức</h2>
          </div>

          <form id="newsForm" class="admin-form">
            <input id="newsTitle" type="text" placeholder="Tiêu đề tin" required />
            <input id="newsSourceName" type="text" placeholder="Nguồn tin" />
            <input id="newsSourceUrl" type="text" placeholder="Link nguồn" />
            <input id="newsImageUrl" type="text" placeholder="Link ảnh" />
            <textarea id="newsSummary" placeholder="Tóm tắt ngắn"></textarea>
            <textarea id="newsContent" placeholder="Nội dung chi tiết"></textarea>
            <input id="newsTags" type="text" placeholder="Tags, ngăn cách bằng dấu phẩy" />

            <label class="checkbox-line">
              <input id="newsPublished" type="checkbox" checked />
              <span>Hiển thị tin tức</span>
            </label>

            <button type="submit" class="primary-btn">Lưu tin tức</button>
          </form>
        </div>

        <div class="admin-card">
          <div class="card-head">
            <h2>Danh sách tin tức</h2>
          </div>
          <div id="newsList" class="admin-list"></div>
        </div>
      </div>
    </section>
  </div>

  <script type="module" src="./admin.js"></script>
</body>
</html>
