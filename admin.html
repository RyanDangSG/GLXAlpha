<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin CMS | Logan Crypto</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root {
      --bg: #070b14;
      --panel: #101729;
      --border: rgba(255,255,255,.08);
      --text: #ffffff;
      --muted: #94a3b8;
      --primary: #3ad7ff;
      --danger: #ff7373;
      --success: #00ff88;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0a0f1c 0%, #070b14 100%);
      color: var(--text); padding-bottom: 50px;
    }
    .app { max-width: 1200px; margin: 0 auto; padding: 18px; }
    
    /* Header */
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 24px; background: rgba(15,23,42,.75);
      border: 1px solid var(--border); border-radius: 18px;
      margin-bottom: 24px; backdrop-filter: blur(12px);
    }
    .badge-admin {
      background: rgba(255, 115, 115, 0.15); color: var(--danger);
      padding: 6px 12px; border-radius: 8px; font-weight: bold; font-size: 12px; text-transform: uppercase;
    }
    .btn { background: var(--primary); color: #000; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .btn:hover { opacity: 0.8; }
    .btn-outline { background: transparent; color: white; border: 1px solid var(--border); padding: 10px 20px; border-radius: 10px; cursor: pointer; transition: 0.2s; }
    .btn-outline:hover { background: rgba(255,255,255,0.05); }

    /* Layout */
    .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .panel { background: rgba(15,23,42,.78); border: 1px solid var(--border); border-radius: 18px; padding: 24px; backdrop-filter: blur(10px); }
    .panel-title { font-size: 20px; font-weight: 800; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; color: var(--primary); }
    
    /* Forms */
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--muted); font-weight: bold; text-transform: uppercase; }
    .form-control { width: 100%; background: #0b1120; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 10px; font-family: inherit; }
    .form-control:focus { outline: none; border-color: var(--primary); }
    select.form-control { appearance: none; }
    
    /* Lists */
    .item-list { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
    .list-item { background: #0b1120; border: 1px solid var(--border); padding: 16px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
    .item-meta { font-size: 12px; color: var(--muted); margin-top: 4px; }
  </style>
</head>
<body>
  
  <div class="app">
    <div class="topbar">
      <div style="display:flex; align-items:center; gap:12px;">
        <i class="fas fa-shield-alt" style="color:var(--danger); font-size: 24px;"></i>
        <div style="font-size:20px;font-weight:800;">HỆ QUẢN TRỊ NỘI DUNG (CMS)</div>
      </div>
      <div style="display:flex; align-items:center; gap:16px;">
        <span class="badge-admin">Admin Privileges</span>
        <button class="btn-outline" onclick="window.location.href='./dashboard.html'">Về Dashboard</button>
      </div>
    </div>

    <div class="grid-layout">
      <div class="panel">
        <div class="panel-title"><i class="fas fa-folder-open"></i> Tạo Khóa Học Mới</div>
        <form id="formCreateCourse">
          <div class="form-group">
            <label>Tên Khóa Học</label>
            <input type="text" id="c_title" class="form-control" placeholder="VD: Nhập môn Order Flow" required>
          </div>
          <div class="form-group">
            <label>Đường dẫn (Slug)</label>
            <input type="text" id="c_slug" class="form-control" placeholder="VD: nhap-mon-order-flow" required>
          </div>
          <div class="grid-layout" style="gap:12px;">
            <div class="form-group">
              <label>Quyền Truy Cập (Role)</label>
              <select id="c_role" class="form-control">
                <option value="free">Free (Tất cả)</option>
                <option value="medium">Medium</option>
                <option value="pro">Pro (Cao cấp nhất)</option>
              </select>
            </div>
            <div class="form-group">
              <label>Thứ tự hiển thị (Order)</label>
              <input type="number" id="c_order" class="form-control" value="1" required>
            </div>
          </div>
          <div class="form-group">
            <label>Trạng Thái</label>
            <select id="c_published" class="form-control">
              <option value="true">Publish (Hiển thị ngay)</option>
              <option value="false">Draft (Bản nháp)</option>
            </select>
          </div>
          <button type="submit" class="btn w-full" style="width:100%;"><i class="fas fa-plus"></i> LƯU KHÓA HỌC</button>
        </form>

        <h3 style="margin-top: 40px; font-size: 16px;">DANH SÁCH KHÓA HỌC HIỆN CÓ</h3>
        <div id="courseList" class="item-list">
          <div class="muted" style="text-align:center; padding: 20px;">Đang tải dữ liệu...</div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title"><i class="fas fa-video"></i> Thêm Bài Học Mới</div>
        <form id="formCreateLesson">
          <div class="form-group">
            <label>Chọn Khóa Học Chứa Bài Này</label>
            <select id="l_courseId" class="form-control" required>
              <option value="">-- Vui lòng chọn khóa học --</option>
            </select>
          </div>
          <div class="form-group">
            <label>Tên Bài Học</label>
            <input type="text" id="l_title" class="form-control" placeholder="VD: Bài 1: Cấu trúc thị trường" required>
          </div>
          <div class="form-group">
            <label>Link Nhúng Vimeo (Vimeo Embed URL)</label>
            <input type="url" id="l_vimeo" class="form-control" placeholder="VD: https://player.vimeo.com/video/123456789">
          </div>
          <div class="grid-layout" style="gap:12px;">
            <div class="form-group">
              <label>Là bài học xem thử? (Preview)</label>
              <select id="l_preview" class="form-control">
                <option value="false">Không (Khóa theo Role)</option>
                <option value="true">Có (Ai cũng xem được)</option>
              </select>
            </div>
            <div class="form-group">
              <label>Thứ tự (Order)</label>
              <input type="number" id="l_order" class="form-control" value="1" required>
            </div>
          </div>
          <div class="form-group">
            <label>Tóm tắt bài học (Tùy chọn)</label>
            <textarea id="l_summary" class="form-control" rows="3" placeholder="Mô tả ngắn gọn nội dung bài học..."></textarea>
          </div>
          <button type="submit" class="btn w-full" style="width:100%;"><i class="fas fa-upload"></i> ĐĂNG BÀI HỌC</button>
        </form>
      </div>
    </div>
  </div>

  <script type="module">
    import { requireRole } from "./auth-guard.js";
    requireRole(["admin"]);
  </script>

  <script type="module">
    import { db } from "./firebase.js";
    import { collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const formCourse = document.getElementById("formCreateCourse");
    const formLesson = document.getElementById("formCreateLesson");
    const courseListDiv = document.getElementById("courseList");
    const selectCourse = document.getElementById("l_courseId");

    // 1. Hàm Load danh sách khóa học
    async function fetchCourses() {
      courseListDiv.innerHTML = "<div class='muted'>Đang tải...</div>";
      const q = query(collection(db, "courses"), orderBy("order", "asc"));
      const snapshot = await getDocs(q);
      
      courseListDiv.innerHTML = "";
      selectCourse.innerHTML = "<option value=''>-- Vui lòng chọn khóa học --</option>";

      if(snapshot.empty) {
        courseListDiv.innerHTML = "<div class='muted'>Chưa có khóa học nào.</div>";
        return;
      }

      snapshot.forEach((doc) => {
        const data = doc.data();
        // Render List
        courseListDiv.innerHTML += `
          <div class="list-item">
            <div>
              <div style="font-weight:bold; color:white;">${data.title}</div>
              <div class="item-meta">Role: <span style="color:var(--primary)">${data.requiredRole}</span> | Order: ${data.order} | Hiển thị: ${data.published}</div>
            </div>
            <i class="fas fa-edit" style="color:var(--muted); cursor:pointer;"></i>
          </div>
        `;
        // Đẩy vào Select Box của Bài Học
        selectCourse.innerHTML += `<option value="${doc.id}">${data.title}</option>`;
      });
    }

    // 2. Xử lý Tạo Khóa Học
    formCourse.addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector("button");
      btn.innerText = "Đang lưu..."; btn.disabled = true;

      try {
        await addDoc(collection(db, "courses"), {
          title: document.getElementById("c_title").value,
          slug: document.getElementById("c_slug").value,
          requiredRole: document.getElementById("c_role").value,
          order: Number(document.getElementById("c_order").value),
          published: document.getElementById("c_published").value === "true",
          thumbnail: "ava.jpg", // Default ảnh nền
          createdAt: new Date().toISOString()
        });
        alert("✅ Đã tạo Khóa học thành công!");
        formCourse.reset();
        fetchCourses(); // Refresh list
      } catch (error) {
        alert("Lỗi: " + error.message);
      } finally {
        btn.innerHTML = "<i class='fas fa-plus'></i> LƯU KHÓA HỌC"; btn.disabled = false;
      }
    });

    // 3. Xử lý Thêm Bài Học (Vào Sub-collection)
    formLesson.addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector("button");
      const courseId = document.getElementById("l_courseId").value;
      
      if(!courseId) { alert("Vui lòng chọn khóa học trước!"); return; }
      
      btn.innerText = "Đang đăng..."; btn.disabled = true;

      try {
        const lessonsRef = collection(db, "courses", courseId, "lessons");
        await addDoc(lessonsRef, {
          title: document.getElementById("l_title").value,
          vimeoEmbedUrl: document.getElementById("l_vimeo").value,
          isPreview: document.getElementById("l_preview").value === "true",
          order: Number(document.getElementById("l_order").value),
          summary: document.getElementById("l_summary").value,
          published: true, // Mặc định hiển thị
          contentHtml: "", // Chừa sẵn để sau này nhập văn bản bổ sung
          createdAt: new Date().toISOString()
        });
        alert("✅ Đã thêm Bài học & Video thành công!");
        formLesson.reset();
      } catch (error) {
        alert("Lỗi: " + error.message);
      } finally {
        btn.innerHTML = "<i class='fas fa-upload'></i> ĐĂNG BÀI HỌC"; btn.disabled = false;
      }
    });

    // Khởi chạy khi load trang
    fetchCourses();
  </script>
</body>
</html>
