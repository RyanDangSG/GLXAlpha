<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập | Logan Crypto</title>
  <link rel="icon" href="./logan-logo.jpg" />
  <style>
    :root{
      --bg:#07111f;
      --card:#0d1726;
      --card-2:#101d30;
      --text:#edf5ff;
      --muted:#a8bdd8;
      --border:rgba(90,129,196,.18);
      --accent:#22d3ee;
      --accent-2:#38bdf8;
      --danger:#ff6b6b;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:"Times New Roman", Times, serif;
      background:
        radial-gradient(circle at top left, rgba(34,211,238,.10), transparent 18%),
        linear-gradient(180deg,#040b16 0%, #07111f 100%);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .auth-wrap{
      width:min(100%, 520px);
      background:linear-gradient(180deg, rgba(13,23,38,.96), rgba(10,20,34,.98));
      border:1px solid var(--border);
      border-radius:24px;
      box-shadow:0 20px 50px rgba(0,0,0,.35);
      padding:28px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:18px;
      text-decoration:none;
      color:inherit;
    }
    .brand img{
      width:46px;
      height:46px;
      border-radius:12px;
      object-fit:cover;
    }
    .brand-title{
      font-size:22px;
      font-weight:900;
      letter-spacing:.5px;
    }
    .brand-title span{color:var(--accent)}
    .brand-sub{
      font-size:11px;
      color:var(--muted);
      letter-spacing:1px;
    }
    h1{
      margin:0 0 18px;
      font-size:28px;
      font-weight:900;
    }
    .form{
      display:grid;
      gap:14px;
    }
    .input{
      width:100%;
      min-height:54px;
      border-radius:16px;
      border:1px solid var(--border);
      background:var(--card-2);
      color:var(--text);
      padding:0 16px;
      outline:none;
    }
    .input:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(34,211,238,.10);
    }
    .btn{
      min-height:54px;
      border:none;
      border-radius:16px;
      background:linear-gradient(135deg,var(--accent),var(--accent-2));
      color:#062033;
      font-weight:900;
      cursor:pointer;
      font-size:18px;
    }
    #errorMessage{
      min-height:22px;
      margin:0;
      color:var(--danger);
      font-size:16px;
      line-height:1.4;
    }
    .auth-links{
      margin-top:8px;
      color:var(--muted);
      font-size:17px;
    }
    .auth-links a{
      color:var(--accent);
      font-weight:700;
      text-decoration:none;
    }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <a href="./index.html" class="brand">
      <img src="./logan-logo.jpg" alt="Logan Crypto">
      <div>
        <div class="brand-title">LOGAN <span>CRYPTO</span></div>
        <div class="brand-sub">TRADE SMART - TRADE LIKE A PRO</div>
      </div>
    </a>

    <h1>Đăng nhập</h1>

    <form id="loginForm" class="form">
      <input id="email" class="input" type="email" placeholder="Email" required />
      <input id="password" class="input" type="password" placeholder="Mật khẩu" required />
      <button type="submit" class="btn">Đăng nhập</button>
      <p id="errorMessage"></p>
    </form>

    <div class="auth-links">
      Chưa có tài khoản? <a href="./register.html">Đăng ký</a>
    </div>
  </div>

  <script type="module">
    import { loginUser } from "./login.js";
    import { redirectByRole } from "./redirect-by-role.js";

    const form = document.getElementById("loginForm");
    const errorEl = document.getElementById("errorMessage");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      if (errorEl) errorEl.textContent = "";

      const email = document.getElementById("email")?.value.trim() || "";
      const password = document.getElementById("password")?.value || "";

      try {
        const result = await loginUser(email, password);
        alert("Đăng nhập thành công");
        redirectByRole(result.profile);
      } catch (err) {
        console.error("LOGIN PAGE ERROR:", err);
        if (errorEl) {
          errorEl.textContent = err.message || "Đăng nhập thất bại";
        } else {
          alert(err.message || "Đăng nhập thất bại");
        }
      }
    });
  </script>
</body>
</html>
