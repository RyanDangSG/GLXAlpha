<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập | Logan Crypto</title>
  <link rel="icon" href="./logan-logo.jpg" />
  <style>
    :root {
      --bg: #07111f;
      --card: #0d1726;
      --card-2: #101d30;
      --text: #edf5ff;
      --sub: #a8bdd8;
      --accent: #56ccff;
      --accent2: #7dd3fc;
      --border: rgba(90, 129, 196, 0.18);
      --danger: #ff7b7b;
      --success: #69db7c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Times New Roman", Times, serif;
      background: linear-gradient(180deg, #06101d, #0a1526);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wrap {
      width: min(100%, 520px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .brand img {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      object-fit: cover;
    }

    .brand h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1;
    }

    .brand h1 span {
      color: var(--accent);
    }

    .sub {
      margin: 0 0 20px;
      color: var(--sub);
      line-height: 1.7;
      font-size: 16px;
    }

    .form-grid {
      display: grid;
      gap: 14px;
    }

    input {
      width: 100%;
      min-height: 52px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--card-2);
      color: var(--text);
      padding: 0 16px;
      outline: none;
    }

    input::placeholder {
      color: #86a1c0;
    }

    button {
      min-height: 52px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #082032;
      font-weight: 800;
      cursor: pointer;
    }

    .secondary-btn {
      margin-top: 10px;
      width: 100%;
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      display: none;
    }

    .error {
      color: var(--danger);
      font-size: 14px;
      line-height: 1.6;
      min-height: 22px;
      margin-top: 12px;
    }

    .success {
      color: var(--success);
      font-size: 14px;
      line-height: 1.6;
      min-height: 22px;
      margin-top: 8px;
    }

    .bottom {
      margin-top: 16px;
      font-size: 15px;
      color: var(--sub);
    }

    .bottom a {
      color: var(--accent);
      text-decoration: none;
    }

    .helper {
      margin-top: 12px;
      color: var(--sub);
      font-size: 14px;
      line-height: 1.7;
    }

    @media (max-width: 640px) {
      .wrap {
        padding: 20px;
      }

      .brand h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <img src="./logan-logo.jpg" alt="Logan Crypto" />
      <h1>LOGAN <span>CRYPTO</span></h1>
    </div>

    <p class="sub">
      Đăng nhập để vào khu vực học tập. Tài khoản chỉ được kích hoạt khi đã xác minh email và số điện thoại.
    </p>

    <form id="loginForm" class="form-grid">
      <input id="email" type="email" placeholder="Email" required />
      <input id="password" type="password" placeholder="Mật khẩu" required />
      <button id="loginBtn" type="submit">Đăng nhập</button>
    </form>

    <button id="resendVerifyBtn" type="button" class="secondary-btn">
      Gửi lại email xác minh
    </button>

    <div id="loginError" class="error"></div>
    <div id="loginSuccess" class="success"></div>

    <p class="helper">
      Nếu bạn đã đăng ký nhưng chưa vào được, hãy kiểm tra:
      email đã xác minh chưa và số điện thoại đã OTP xong chưa.
    </p>

    <div class="bottom">
      Chưa có tài khoản? <a href="./register.html">Đăng ký ngay</a>
    </div>
  </div>

  <script type="module" src="./login.js"></script>
</body>
</html>
