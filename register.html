<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng ký | Logan Crypto</title>
  <link rel="icon" href="./logan-logo.jpg" />
  <style>
    :root{
      --bg:#07111f;
      --card:#0d1726;
      --card-2:#101d30;
      --text:#edf5ff;
      --sub:#a8bdd8;
      --accent:#56ccff;
      --accent2:#7dd3fc;
      --border:rgba(90,129,196,.18);
      --danger:#ff7b7b;
      --success:#69db7c;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"Times New Roman", Times, serif;
      background:linear-gradient(180deg,#06101d,#0a1526);
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .wrap{
      width:min(100%,560px);
      background:var(--card);
      border:1px solid var(--border);
      border-radius:24px;
      padding:28px;
      box-shadow:0 20px 60px rgba(0,0,0,.35);
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:18px;
    }
    .brand img{
      width:52px;height:52px;border-radius:14px;object-fit:cover;
    }
    .brand h1{
      margin:0;font-size:28px;line-height:1;
    }
    .brand h1 span{color:var(--accent)}
    .sub{
      margin:0 0 20px;
      color:var(--sub);
      line-height:1.7;
      font-size:16px;
    }
    .form-grid{
      display:grid;
      gap:14px;
    }
    input{
      width:100%;
      min-height:52px;
      border-radius:16px;
      border:1px solid var(--border);
      background:var(--card-2);
      color:var(--text);
      padding:0 16px;
      outline:none;
    }
    input::placeholder{color:#86a1c0}

    .phone-group{
      display:grid;
      grid-template-columns:86px 1fr;
      gap:12px;
    }
    .phone-prefix{
      min-height:52px;
      border-radius:16px;
      border:1px solid var(--border);
      background:var(--card-2);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
    }

    button{
      min-height:52px;
      border:none;
      border-radius:16px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#082032;
      font-weight:800;
      cursor:pointer;
    }
    button.secondary{
      background:transparent;
      color:var(--text);
      border:1px solid var(--border);
    }
    .muted{
      color:var(--sub);
      font-size:14px;
      line-height:1.7;
    }
    .error{
      color:var(--danger);
      font-size:14px;
      line-height:1.6;
      min-height:22px;
    }
    .success{
      color:var(--success);
      font-size:14px;
      line-height:1.6;
      min-height:22px;
    }
    .otp-box{
      margin-top:20px;
      padding-top:20px;
      border-top:1px solid var(--border);
    }
    .otp-box.hidden,
    .verify-box.hidden{
      display:none;
    }
    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    .bottom{
      margin-top:16px;
      font-size:15px;
      color:var(--sub);
    }
    .bottom a{color:var(--accent)}
    #recaptcha-container{
      margin-top:14px;
    }
    @media (max-width:640px){
      .row{grid-template-columns:1fr}
      .wrap{padding:20px}
      .phone-group{grid-template-columns:74px 1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <img src="./logan-logo.jpg" alt="Logan Crypto" />
      <h1>LOGAN <span>CRYPTO</span></h1>
    </div>

    <p class="sub">
      Tạo tài khoản mới. Hệ thống sẽ yêu cầu xác thực số điện thoại và email trước khi kích hoạt đăng nhập.
    </p>

    <form id="registerForm" class="form-grid">
      <input id="name" type="text" placeholder="Họ và tên" required />

      <div class="phone-group">
        <div class="phone-prefix">+84</div>
        <input id="zalo" type="tel" placeholder="Zalo / Số điện thoại, ví dụ: 898983066" required />
      </div>

      <input id="email" type="email" placeholder="Email" required />
      <input id="password" type="password" placeholder="Mật khẩu" required />
      <input id="confirmPassword" type="password" placeholder="Nhập lại mật khẩu" required />

      <button type="submit" id="registerBtn">Tạo tài khoản</button>
    </form>

    <div id="registerError" class="error"></div>
    <div id="registerSuccess" class="success"></div>

    <div class="otp-box hidden" id="otpBox">
      <p class="muted">
        Bước 2: Gửi OTP để xác thực số điện thoại.
      </p>

      <div class="row">
        <button type="button" id="sendOtpBtn">Gửi mã OTP</button>
        <button type="button" id="resendEmailBtn" class="secondary">Gửi lại email xác minh</button>
      </div>

      <div id="recaptcha-container"></div>

      <div class="verify-box hidden" id="verifyBox">
        <div class="form-grid" style="margin-top:14px;">
          <input id="otpCode" type="text" placeholder="Nhập mã OTP" />
          <button type="button" id="verifyOtpBtn">Xác thực OTP</button>
        </div>
      </div>

      <div id="otpError" class="error"></div>
      <div id="otpSuccess" class="success"></div>

      <p class="muted" style="margin-top:10px;">
        Sau khi xác thực OTP xong, hãy mở email và bấm link xác minh. Sau đó bạn có thể đăng nhập.
      </p>
    </div>

    <div class="bottom">
      Đã có tài khoản? <a href="./login.html">Đăng nhập</a>
    </div>
  </div>

  <script type="module" src="./register.js"></script>
</body>
</html>
